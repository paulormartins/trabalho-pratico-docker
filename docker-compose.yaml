version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - guessgame_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      retries: 5
      timeout: 3s

  backend-1:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"
    networks:
      - guessgame_network

  backend-2:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"
    networks:
      - guessgame_network

  backend-3:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"
    networks:
      - guessgame_network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    networks:
      - guessgame_network

volumes:
  postgres_data:

networks:
  guessgame_network:
    driver: bridge